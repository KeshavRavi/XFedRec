seed: 42
data:
  movielens_path: "data/ml-100k.csv"

model:
  type: "ncf"
  n_users: 944
  n_items: 1683
  emb_size: 32
  local_epochs: 1
  local_batch_size: 64

federation:
  n_clients: 10
  frac: 1.0
  rounds: 10
  aggregation: fedavg
  
  # 🎯 THE NON-IID SETUP
  partition_method: dirichlet
  alpha: 0.1             # 0.1 is highly skewed (Non-IID). 100.0 is IID.

drift:
  enabled: false

dp:
  enabled: false